.intro-box { background: var(--white); border: 1.5px solid #e0d8f0; border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
.intro-box h3 { color: var(--plum); margin-bottom: 10px; font-size: 17px; }

.q-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; margin-bottom: 15px; border-top: 3px solid var(--violet); }
.q-text { font-size: 15px; font-family: Georgia, serif; line-height: 1.6; color: #1a1a2e; margin-bottom: 15px; }
.opt { display: flex; align-items: flex-start; padding: 12px 15px; border: 1.5px solid #e0d8f0; border-radius: 8px; cursor: pointer; background: var(--cream); margin-bottom: 8px; transition: 0.2s; }
.opt.sel { border-color: var(--violet); background: #ede7f6; font-weight: 600; }

.btn { display: inline-block; padding: 15px 32px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; background: var(--violet); color: #fff; width: 100%; }
.btn-pdf { background: #1a6040; margin-top: 25px; }

.res-box { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-top: 25px; }
.res-head { background: var(--plum); padding: 25px; color: white; }
.score-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; margin: 20px 0; }
.sc { text-align: center; padding: 15px; border-radius: 8px; border: 2px solid; }
.sc .val { font-size: 32px; font-family: Georgia, serif; font-weight: bold; }

.ph3 { font-size: 15px; font-weight: 700; color: var(--plum); margin: 25px 0 10px; border-bottom: 2px solid var(--gold); padding-bottom: 5px; }
.tip-box { background: var(--lightpur); border-left: 5px solid var(--violet); padding: 15px; margin-bottom: 15px; border-radius: 0 8px 8px 0; }
.tip-box p { font-size: 13.5px; line-height: 1.6; color: #333; margin-bottom: 8px; }
.tip-rel { font-size: 11px; text-transform: uppercase; color: var(--violet); font-weight: bold; display: block; margin-bottom: 5px; }
.tip-example { font-style: italic; color: #444; background: rgba(255,255,255,0.6); padding: 10px; border-radius: 4px; display: block; margin-top: 8px; border-left: 3px solid var(--gold); font-size: 13px; }

.synergy-table { width: 100%; border-collapse: collapse; margin: 15px 0; }

var answers = new Array(15).fill(null);

function buildQuestions() {
  var html = '';
  QS.forEach(function(q, qi) {
    html += '<div class="q-card"><p><strong>' + q.txt + '</strong></p>';
    q.opts.forEach(function(o, oi) {
      html += `<div class="opt" id="opt-${qi}-${oi}" onclick="pickAnswer(${qi},${oi})"><label>${o.t}</label></div>`;
    });
    html += '</div></div>';
  });
  document.getElementById('q-container').innerHTML = html;
}

function pickAnswer(qi, oi) {
  answers[qi] = oi;
  for (var i = 0; i < 4; i++) { var el = document.getElementById('opt-' + qi + '-' + i); if (el) el.classList.remove('sel'); }
  document.getElementById('opt-' + qi + '-' + oi).classList.add('sel');
  var done = answers.filter(a => a !== null).length;
  document.getElementById('prog-fill').style.width = (done/15*100)+'%';
}

function calcScores(ans) {
  var sc = {BB:0, X:0, Y:0, Z:0}; var mythsCount = 0; var stereos = [];
  ans.forEach((ai, qi) => {
    var opt = QS[qi].opts[ai];
    sc.BB += opt.w.BB; sc.X += opt.w.X; sc.Y += opt.w.Y; sc.Z += opt.w.Z;
    if (opt.myth) { mythsCount++; stereos.push({txt: opt.t, gen: opt.gen}); }
  });
  var flex = Math.min(100, Math.round((sc.BB+sc.X+sc.Y+sc.Z)/75*100));
  var profile = flex >= 75 ? 'Ambasador' : flex >= 45 ? 'Mediator' : 'Odkrywca';
  var maxVal = Math.max(sc.BB, sc.X, sc.Y, sc.Z);
  var closest = Object.keys(sc).find(key => sc[key] === maxVal);
  return { sc, flex, mythsCount, stereos, awareness: Math.max(0, 100 - mythsCount * 15), profile, closest };
}

async function submitTest() {
  if (answers.includes(null)) { alert("Uzupełnij wszystkie odpowiedzi!"); return; }
  var res = calcScores(answers);
  document.getElementById('quiz-view').style.display = 'none';
  try {
    await db.ref('wyniki').push({ flex: res.flex, myths: res.mythsCount, BB: res.sc.BB, X: res.sc.X, Y: res.sc.Y, Z: res.sc.Z, profile: res.profile });
  } catch(e) {}
  renderIndividual(res);
}

function renderIndividual(res) {
  var PT = {
    Ambasador: { icon:'🌟', full:'Pokoleniowy Ambasador', desc:'Twoje podejście promuje synergię. Rozumiesz rzadką sztukę adaptacji stylu komunikacji bez tracenia autentyczności.' },
    Mediator: { icon:'🔍', full:'Rozwijający się Mediator', desc:'Masz solidne fundamenty, ale wciąż działasz na pewnych automatyzmach.' },
    Odkrywca: { icon:'🚀', full:'Odkrywca Pokoleń', desc:'Dopiero zaczynasz dostrzegać głębię różnic. To świetny punkt startowy.' }
  };
  var p = PT[res.profile];
  
  var tipsHtml = '';
  var usedGens = [];
  res.stereos.forEach(s => {
    if(!usedGens.includes(s.gen) && TIPS_BANK[s.gen]) {
        var bank = TIPS_BANK[s.gen];
        var randomTip = bank[Math.floor(Math.random() * bank.length)];
        tipsHtml += `<div class="tip-box">
          <span class="tip-rel">RELACJA: ${randomTip.rel}</span>
          <p><strong>Wyzwanie: ${randomTip.wyzwanie}</strong></p>
          <span class="tip-example">PRZYKŁAD: ${randomTip.przyklad}</span>
        </div>`;
        usedGens.push(s.gen);
    }
  });

  if(!tipsHtml) tipsHtml = '<div class="tip-box">✓ Twoje odpowiedzi wskazują na wysoką elastyczność i brak aktywnych uprzedzeń. Kontynuuj budowanie kultury Multipliera!</div>';

  var synergyTable = `
    <table class="synergy-table">
      <tr><th>Kto z kim współpracuje najlepiej?</th><th>Dlaczego to działa?</th></tr>
      <tr><td><strong>Zetki + Boomerzy</strong></td><td>To duet marzeń w mentoringu odwróconym. Zetki dają technologię, Boomerzy dają spokój i kontakty.</td></tr>
      <tr><td><strong>Gen X + Millenialsi</strong></td><td>Oba pokolenia cenią konkret. X-y dają "jak to zrobić", a Y-ki dają "zróbmy to mądrzej".</td></tr>
    </table>`;

  var congrats = (res.flex === 100 && res.mythsCount === 0) ? '<div class="congrats-card">🎉 Gratulacje! Twoja postawa jest wzorem inkluzywności międzypokoleniowej!</div>' : '';

  document.getElementById('ind-results').innerHTML = `
    <div class="res-box">
      <div class="res-head"><div class="res-title">${p.icon} ${p.full}</div></div>
      <div class="res-body">
        ${congrats}
        <div class="score-grid">
          <div class="sc" style="border-color:var(--violet)"><div class="lbl">Elastyczność</div><div class="val">${res.flex}%</div></div>
          <div class="sc" style="border-color:var(--gold)"><div class="lbl">Świadomość</div><div class="val">${res.awareness}%</div></div>
        </div>
        <div class="ph3">Twoja dominująca strategia: ${res.closest}</div>
        ${synergyTable}
        <div class="ph3">Praktyczne wskazówki rozwojowe</div>
        ${tipsHtml}
        <button class="btn btn-pdf" id="pdf-btn" onclick="generatePDF()">Pobierz raport PDF &darr;</button>
      </div>
    </div>`;
  window.scrollTo(0,0);
}

function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const header = document.getElementById('pdf-header');
    const btn = document.getElementById('pdf-btn');

    header.style.display = 'block'; 
    if(btn) btn.style.display = 'none'; 

    html2canvas(document.getElementById('pdf-area'), {scale: 2}).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const imgWidth = 210; 
        const imgHeight = canvas.height * imgWidth / canvas.width;
        doc.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
        doc.save("Raport_VIA_Multiplier.pdf");
        header.style.display = 'none'; 
        if(btn) btn.style.display = 'block'; 
    });
}
buildQuestions();
